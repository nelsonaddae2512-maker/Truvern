<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Truvern UI Atlas</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:20px;background:#0b1220;color:#e5e7eb}
    a{color:#93c5fd;text-decoration:none}
    .card{background:#0f172a;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin:12px 0}
    img{max-width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.08)}
    code{background:#111827;padding:2px 6px;border-radius:8px}
    .muted{color:#94a3b8;font-size:12px}
  </style>
</head>
<body>
  <h1>Truvern UI Atlas</h1>
  <p class="muted">Base: <code>http://localhost:3000</code></p>
  <div class="card">
        <h2>home</h2>
        <div><a href="http://localhost:3000/" target="_blank">/</a></div>
        <div style="margin-top:10px"><img src="./home.png" alt="home"/></div>
      </div>
<div class="card">
        <h2>pricing</h2>
        <div><a href="http://localhost:3000/pricing" target="_blank">/pricing</a></div>
        <div style="margin-top:10px"><img src="./pricing.png" alt="pricing"/></div>
      </div>
<div class="card">
        <h2>upgrade</h2>
        <div><a href="http://localhost:3000/upgrade" target="_blank">/upgrade</a></div>
        <div style="margin-top:10px"><img src="./upgrade.png" alt="upgrade"/></div>
      </div>
<div class="card">
        <h2>vendors</h2>
        <div><a href="http://localhost:3000/vendors" target="_blank">/vendors</a></div>
        <div style="margin-top:10px"><img src="./vendors.png" alt="vendors"/></div>
      </div>
<div class="card">
        <h2>board-packet</h2>
        <div><a href="http://localhost:3000/board-packet" target="_blank">/board-packet</a></div>
        <div style="margin-top:10px"><img src="./board-packet.png" alt="board-packet"/></div>
      </div>
<div class="card">
        <h2>billing</h2>
        <div><a href="http://localhost:3000/account/billing" target="_blank">/account/billing</a></div>
        <div style="margin-top:10px"><img src="./billing.png" alt="billing"/></div>
      </div>
<div class="card">
        <h2>board-packet_print</h2>
        <div><a href="http://localhost:3000/board-packet?print=1" target="_blank">/board-packet?print=1</a></div>
        <div style="margin-top:10px"><img src="./board-packet_print.png" alt="board-packet_print"/></div>
      </div>
</body>
</html>
